# ============================================================
# NowShare — Docker Compose Monitoring Stack
# Run: docker-compose up -d
# ============================================================
# Services:
#   - app:        NowShare Flask app          → http://localhost:3000
#   - prometheus: Metrics collection          → http://localhost:9090
#   - grafana:    Dashboard visualization     → http://localhost:3001
# ============================================================

services:
  # ----------------------------------------------------------
  # NowShare Application
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nowshare-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-nowshare-docker-dev-key}
      - MONGO_URI=${MONGO_URI:-}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
      - FILE_EXPIRY_MINUTES=${FILE_EXPIRY_MINUTES:-10}
    volumes:
      - app-uploads:/app/uploads
    networks:
      - monitoring-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # Prometheus — Metrics Scraper
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nowshare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-net
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

  # ----------------------------------------------------------
  # Grafana — Dashboard & Visualization
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: nowshare-grafana
    ports:
      - "3001:3000"
    environment:
      # Default admin credentials (change in production)
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Allow anonymous viewing (optional, remove for strict security)
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Provisioning paths
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      # UI preferences
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      # Auto-provision data sources and dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Persistent storage for Grafana DB (users, annotations, alerts)
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-net
    restart: unless-stopped
    depends_on:
      - prometheus

# ----------------------------------------------------------
# Named Volumes — Data persists across restarts
# ----------------------------------------------------------
volumes:
  app-uploads:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ----------------------------------------------------------
# Network — All services communicate via service names
# ----------------------------------------------------------
networks:
  monitoring-net:
    driver: bridge
