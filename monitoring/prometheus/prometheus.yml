# ============================================================
# Prometheus Configuration — NowShare Monitoring
# ============================================================

# Global settings apply to all scrape jobs
global:
  # How often Prometheus scrapes targets
  scrape_interval: 15s
  # How often rules are evaluated (alerting, recording)
  evaluation_interval: 15s
  # Timeout for scrape requests
  scrape_timeout: 10s

# ============================================================
# Scrape Targets
# ============================================================
scrape_configs:
  # ----------------------------------------------------------
  # Job 1: NowShare Application
  # ----------------------------------------------------------
  # Scrapes the /metrics endpoint exposed by prometheus_client
  # Uses Docker Compose service name "app" (NOT localhost)
  - job_name: 'nowshare-app'
    # Override the default /metrics path if needed (default is /metrics)
    metrics_path: /metrics
    # Use the Docker Compose service name as the hostname
    # Port 3000 is the INTERNAL container port (not the host port)
    static_configs:
      - targets: ['app:3000']
        labels:
          app: 'nowshare'
          environment: 'docker'

  # ----------------------------------------------------------
  # Job 2: NowShare Production (Railway)
  # ----------------------------------------------------------
  # Scrapes the live production website over HTTPS
  - job_name: 'nowshare-app-production'
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['share-now.up.railway.app']
        labels:
          app: 'nowshare-prod'
          environment: 'production'

  # ----------------------------------------------------------
  # Job 3: Prometheus Self-Monitoring
  # ----------------------------------------------------------
  # Prometheus scrapes its own metrics for health monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
