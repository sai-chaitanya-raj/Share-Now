# ============================================================
# Grafana Dashboard Provider — Auto-load dashboards
# ============================================================

apiVersion: 1

providers:
  - name: 'NowShare Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
