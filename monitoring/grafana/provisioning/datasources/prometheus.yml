# ============================================================
# Grafana Datasource — Auto-provisioned Prometheus Connection
# ============================================================
# This file is mounted into Grafana and automatically creates
# the Prometheus data source on startup. No manual setup needed.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Use Docker Compose service name (NOT localhost)
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      # Time interval matching Prometheus scrape interval
      timeInterval: '15s'
      # HTTP method for querying
      httpMethod: POST
