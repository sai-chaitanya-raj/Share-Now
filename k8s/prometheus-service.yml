# Prometheus — Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: nowshare
  labels:
    app: nowshare
    component: prometheus
spec:
  type: NodePort
  selector:
    app: nowshare
    component: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
