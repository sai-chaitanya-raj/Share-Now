# Grafana — Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nowshare
  labels:
    app: nowshare
    component: grafana
spec:
  type: NodePort
  selector:
    app: nowshare
    component: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30010
