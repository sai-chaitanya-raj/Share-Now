# NowShare App — Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: nowshare-app
  namespace: nowshare
  labels:
    app: nowshare
    component: app
spec:
  type: NodePort
  selector:
    app: nowshare
    component: app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30000
