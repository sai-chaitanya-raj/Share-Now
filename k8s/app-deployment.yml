# NowShare App — Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nowshare-app
  namespace: nowshare
  labels:
    app: nowshare
    component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nowshare
      component: app
  template:
    metadata:
      labels:
        app: nowshare
        component: app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nowshare
          image: nowshare-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: FLASK_DEBUG
              value: "false"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nowshare-secrets
                  key: secret-key
                  optional: true
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: nowshare-secrets
                  key: mongo-uri
                  optional: true
            - name: FILE_EXPIRY_MINUTES
              value: "10"
            - name: MAX_FILE_SIZE_MB
              value: "100"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
