# Grafana — Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nowshare
  labels:
    app: nowshare
    component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nowshare
      component: grafana
  template:
    metadata:
      labels:
        app: nowshare
        component: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_DEFAULT_THEME
              value: "dark"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-data
          emptyDir: {}
