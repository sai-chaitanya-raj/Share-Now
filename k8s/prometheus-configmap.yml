# Prometheus Configuration — Kubernetes ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nowshare
  labels:
    app: nowshare
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'nowshare-app'
        metrics_path: /metrics
        static_configs:
          - targets: ['nowshare-app:3000']
            labels:
              app: 'nowshare'
              environment: 'kubernetes'

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
