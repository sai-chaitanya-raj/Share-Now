# Prometheus — Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: nowshare
  labels:
    app: nowshare
    component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nowshare
      component: prometheus
  template:
    metadata:
      labels:
        app: nowshare
        component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
              name: http
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=15d'
            - '--web.enable-lifecycle'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
